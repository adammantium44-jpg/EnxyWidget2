name: Build EnxyWidget

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - uses: microsoft/setup-msbuild@v2

    - uses: lukka/get-cmake@latest

    - uses: lukka/run-vcpkg@v11

    # CACHE
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          build
          vcpkg_installed
          C:/vcpkg/packages
          C:/vcpkg/downloads
          C:/vcpkg/buildtrees
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}

    - name: Clean
      shell: cmd
      run: |
        if exist build rmdir /s /q build
    - name: Build  
      shell: cmd  
      env:  
        # Hapus variabel yang bermasalah  
        VCPKG_BINARY_SOURCES: ""  
      run: |  
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64  
          
        :: Pastikan Ninja ada di path  
        set PATH=%PATH%;C:\ProgramData\chocolatey\bin  
          
        :: Jika ninja belum ada, instal (opsional tapi aman)  
        where ninja || choco install ninja -y

        :: Setup VCPKG_ROOT  
        set VCPKG_ROOT=%GITHUB_WORKSPACE%\vcpkg

        :: Konfirmasi file berada di tempat yang benar  
        dir CMakePresets.json  
          
        :: Jalankan konfigurasi  
        cmake --preset=release  
        cmake --build --build build/release    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: EnxyWidget
        path: build/**/*.dll
