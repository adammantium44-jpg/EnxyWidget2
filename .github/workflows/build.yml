name: Build EnxyAbilities

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - uses: microsoft/setup-msbuild@v2

    - uses: lukka/get-cmake@latest

    - name: List installed packages  
      shell: cmd  
      run: |  
        dir "%VCPKG_INSTALLATION_ROOT%\installed"  

    - name: Setup vcpkg  
      run: |  
        # VCPKG_INSTALLATION_ROOT sudah tersedia di runner windows-2022  
        echo "vcpkg root is at %VCPKG_INSTALLATION_ROOT%"  
        # Jika perlu update, lakukan di sini, jika tidak, lewatkan saja.  

    # CACHE
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          build
          vcpkg_installed
          C:/vcpkg/packages
          C:/vcpkg/downloads
          C:/vcpkg/buildtrees
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}

    - name: Configure and Build  
      shell: cmd  
      run: |  
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64  
        "%VCPKG_INSTALLATION_ROOT%\vcpkg.exe" install --triplet x64-windows-static  
        cmake -B build -S . -G "Ninja" ^  
          -DCMAKE_BUILD_TYPE=Release ^  
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake ^  
          -DVCPKG_MANIFEST_MODE=ON  
        cmake --build build --config Release   --parallel 4
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: EnxyAbilities
        path: build/**/*.dll
