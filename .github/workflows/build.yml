name: Build EnxyWidgets

on:  
  push:  
  workflow_dispatch:

jobs:  
  build:  
    runs-on: windows-2022

    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
        with:  
          submodules: 'recursive'

      - name: Setup CMake  
        uses: lukka/get-cmake@latest

      - name: Setup local vcpkg  
        shell: cmd  
        run: |  
          if not exist vcpkg (git clone https://github.com/microsoft/vcpkg.git)  
          if not exist .\vcpkg\vcpkg.exe (call .\vcpkg\bootstrap-vcpkg.bat)

      - name: Build  
        shell: cmd  
        run: |  
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64  
          cmake -B build -S . -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCommonLibSSE_DIR=%GITHUB_WORKSPACE%/external/CommonLibSSE-NG/cmake -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake  
          cmake --build build --config Release --parallel 4

      - name: Upload DLL  
        uses: actions/upload-artifact@v4  
        with:  
          name: EnxyWidgets  
          path: build/**/*.dll  