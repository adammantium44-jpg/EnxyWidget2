name: Build EnxyAbilities

on:  
  push:  
  workflow_dispatch:

jobs:  
  build:  
    runs-on: windows-2022  
    env:  
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg/  
      # Gunakan vcpkg.json yang ada di root repo Anda  
    steps:  
      - uses: actions/checkout@v4

      - name: Run vcpkg  
        uses: lukka/run-vcpkg@v11  
        with:  
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake  
        uses: lukka/run-cmake@v10  
        with:  
          configurePreset: 'windows-default' # Pastikan Anda punya CMakePresets.json, atau gunakan command di bawah  
          # Jika Anda tidak punya CMakePresets.json, gunakan baris bawah ini:  
          configurePreset: ''  
          cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'  
          useVcpkgToolchainFile: true  
          buildDirectory: '${{ github.workspace }}/build'

      - name: Build  
        uses: lukka/run-cmake@v10  
        with:  
          buildPreset: ''  
          buildDirectory: '${{ github.workspace }}/build'

      - name: Upload DLL  
        uses: actions/upload-artifact@v4  
        with:  
          name: EnxyAbilities  
          path: build/**/*.dll  